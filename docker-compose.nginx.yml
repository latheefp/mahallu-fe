version: '3.8'

# Complete Stack with Nginx Reverse Proxy
# This setup includes the frontend and Nginx for SSL termination

services:
  # Mahallu Frontend Application
  mahallu-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${BACKEND_API_URL:-https://services.mahallu.com/api}
    image: mahallu-frontend:latest
    container_name: mahallu-frontend
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=${BACKEND_API_URL:-https://services.mahallu.com/api}
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    networks:
      - mahallu-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.mahallu.service=frontend"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: mahallu-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - mahallu-frontend
    restart: unless-stopped
    networks:
      - mahallu-network
    labels:
      - "com.mahallu.service=proxy"

networks:
  mahallu-network:
    driver: bridge

volumes:
  nginx-logs:
    driver: local
