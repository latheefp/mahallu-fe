version: '3.8'

# Production Docker Compose Configuration
# This file includes advanced features for production deployment

services:
  mahallu-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${BACKEND_API_URL:-https://services.mahallu.com/api}
    image: mahallu-frontend:latest
    container_name: mahallu-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      # Backend API URL
      - NEXT_PUBLIC_API_URL=${BACKEND_API_URL:-https://services.mahallu.com/api}
      
      # Node environment
      - NODE_ENV=production
      
      # Disable telemetry
      - NEXT_TELEMETRY_DISABLED=1
      
      # Timezone (optional)
      - TZ=${TIMEZONE:-Asia/Kolkata}
    
    # Resource limits (adjust based on your server)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    
    restart: unless-stopped
    
    networks:
      - mahallu-network
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    labels:
      - "com.mahallu.description=Mahallu Management Frontend"
      - "com.mahallu.version=2.0"
      - "traefik.enable=true"
      - "traefik.http.routers.mahallu.rule=Host(`${DOMAIN:-mahallu.local}`)"

networks:
  mahallu-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# Optional: Uncomment to add volumes
# volumes:
#   mahallu-logs:
#     driver: local
