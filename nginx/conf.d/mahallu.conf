# Mahallu Frontend - Nginx Configuration

# Upstream for Next.js application
upstream mahallu_frontend {
    server mahallu-frontend:3000;
    keepalive 64;
}

# HTTP Server - Redirect to HTTPS (uncomment when SSL is configured)
# server {
#     listen 80;
#     server_name mahallu.com www.mahallu.com;
#     return 301 https://$server_name$request_uri;
# }

# HTTP Server (Development/Non-SSL)
server {
    listen 80;
    server_name mahallu.local localhost;

    # Logging
    access_log /var/log/nginx/mahallu-access.log;
    error_log /var/log/nginx/mahallu-error.log;

    # Client upload size
    client_max_body_size 20M;

    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;

    # Next.js specific
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_cache_bypass $http_upgrade;

    # Main location
    location / {
        proxy_pass http://mahallu_frontend;
        proxy_redirect off;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static files caching
    location /_next/static {
        proxy_pass http://mahallu_frontend;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Images optimization
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        proxy_pass http://mahallu_frontend;
        add_header Cache-Control "public, max-age=31536000";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

