name: Deploy Frontend to Kubernetes

on:
  push:
    branches:
      - main
    paths:
      - "*"
      - ".github/workflows/deploy.yaml"
  workflow_dispatch:

env:
  APP_DIR: .
  IMAGE_NAME: ${{ vars.FRONTEND_IMAGE_NAME }}
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
  DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
  KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
  DEPLOYMENT: ${{ vars.FRONTEND_K8S_DEPLOYMENT }}
  NAMESPACE: ${{ vars.FRONTEND_K8S_NAMESPACE }}
  CONTAINERNAME: ${{ vars.FRONTEND_K8S_CONTAINER }}
  NEXT_PUBLIC_API_URL: ${{ vars.FRONTEND_NEXT_PUBLIC_API_URL }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      CURRENT_DATE: ${{ github.run_id }}
      IMAGE_TAG: ${{ github.run_id }}_${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required configuration
        run: |
          test -n "$DOCKERHUB_USERNAME" || { echo "Missing repo variable: DOCKERHUB_USERNAME"; exit 1; }
          test -n "$DOCKERHUB_PASSWORD" || { echo "Missing secret: DOCKERHUB_PASSWORD"; exit 1; }
          test -n "$KUBE_CONFIG_DATA" || { echo "Missing secret: KUBE_CONFIG_DATA"; exit 1; }
          test -n "$IMAGE_NAME" || { echo "Missing repo variable: FRONTEND_IMAGE_NAME"; exit 1; }
          test -n "$DEPLOYMENT" || { echo "Missing repo variable: FRONTEND_K8S_DEPLOYMENT"; exit 1; }
          test -n "$NAMESPACE" || { echo "Missing repo variable: FRONTEND_K8S_NAMESPACE"; exit 1; }
          test -n "$CONTAINERNAME" || { echo "Missing repo variable: FRONTEND_K8S_CONTAINER"; exit 1; }
          IMAGE_REPO="$DOCKERHUB_USERNAME/$IMAGE_NAME"
          echo "IMAGE_REPO=$IMAGE_REPO" >> "$GITHUB_ENV"

      - name: Build and push Docker image
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "Building image with tag $IMAGE_REPO:$IMAGE_TAG"
          docker build "$APP_DIR" \
            -t "$IMAGE_REPO:$IMAGE_TAG" \
            -t "$IMAGE_REPO:latest" \
            --build-arg BUILD_DATE="$CURRENT_DATE" \
            --build-arg COMMIT_HASH="$COMMIT_HASH" \
            --build-arg NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL"
          echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          docker push "$IMAGE_REPO:$IMAGE_TAG"
          docker push "$IMAGE_REPO:latest"

      - name: Update Kubernetes deployment
        run: |
          echo "$KUBE_CONFIG_DATA" | base64 -d > kubeconfig.yaml
          echo "Using image tag: $IMAGE_TAG"
          export KUBECONFIG=$PWD/kubeconfig.yaml
          kubectl config get-contexts
          kubectl config use-context default
          kubectl set image -n "$NAMESPACE" deployment/"$DEPLOYMENT" "$CONTAINERNAME"="$IMAGE_REPO:$IMAGE_TAG"
          kubectl -n "$NAMESPACE" rollout restart deployment/"$DEPLOYMENT"
